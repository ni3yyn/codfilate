name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🏗 Link Project
        run: npx eas-cli project:init --id fe82c9b6-e142-4c3d-bb52-26dbb6875497

      - name: 🚀 Build APK
        run: npx eas-cli build --platform android --profile preview --non-interactive

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk # EAS usually puts it in the root if --local is used, but here it's cloud-based. 
          # Note: EAS cloud builds return a URL. To download the file to the runner, 
          # we would need to fetch it from the API or use --local (which requires a larger runner).
          # For now, EAS will provide the link in the build dashboard.
